# Caratulai Configuration
# See CLAUDE.md and README.md for full documentation
#
# Secrets (API keys) → .env
# Everything else → this file

cli:
  # Default tags for quick testing (comma-separated)
  default_tags: "prometheus,eagle,rock,fire,camel,lion,child"

  # Seed for generation (1–2147483647). Higher = more variation.
  seed: 16384

generation:
  # Canvas aspect ratio: square, 16:9, 4:3, 21:9, 9:16, 3:4
  ratio: "16:9"

  # Allow all SVG shapes (true = path, line, rect, circle, use, image, text, etc.)
  # false = restrict to fundamental shapes only
  allow_all_shapes: true

  # Image profile/style: sagan | picasso | contento | dictionary
  # - sagan: Voyager Golden Record (gold background, silver text/lines)
  # - picasso: Picasso-inspired (elegant lines, minimal)
  # - contento: Less restrained, rich complexity, many shapes
  # - dictionary: Dictionary-based (uses image vocabulary/patterns)
  profile: "sagan"

models:
  # Text extraction (narrative → concept tags)
  text:
    provider: "openrouter"
    model: "deepseek/deepseek-v4-flash"
    api_key_env: "TEXT_MODEL_API_KEY"

  # SVG generation (tags → SVG)
  # Better models: x-ai/grok-2-1212 (technical), meta-llama/llama-3.1-70b-instruct (capable)
  svg:
    provider: "openrouter"
    model: "x-ai/grok-2-1212"
    api_key_env: "SVG_MODEL_API_KEY"

  # Image reading (extract visual concepts) [Future: M6]
  image:
    provider: "openrouter"
    model: "gpt-4-vision"
    api_key_env: "IMAGE_MODEL_API_KEY"

output:
  # Auto-save directory for generated SVGs (with timestamp filenames)
  # Leave empty to disable. Format: {yyyyMMdd_HHmmssSSS}.svg
  auto_save_dir: "./output"

palette:
  # Available: bw, grayscale, sepia, palette-16, palette-256
  default: "palette-256"
  # temperature: 0.7  # Optional: uncomment to override default

# Image generation profiles (styles)
profiles:
  sagan:
    name: "Voyager Golden Record"
    description: "Gold background, silver/white text and lines. Like the actual Voyager record plate."
    palette: "palette-256"
    background_color: "#d4af37"  # Gold
    foreground_color: "#c0c0c0"  # Silver

  picasso:
    name: "Picasso"
    description: "Elegant lines, minimal shapes, sophisticated. TBD: define aesthetic."
    palette: "palette-256"

  contento:
    name: "Contento"
    description: "Less restrained, more shapes, visual complexity. Rich and dense composition."
    palette: "palette-256"
    max_elements: 80
    allow_all_shapes: true

  dictionary:
    name: "Dictionary"
    description: "Dictionary-based image generation. Uses vocabulary of visual patterns and icons. TBD."
    palette: "palette-256"
